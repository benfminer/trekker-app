# Fixture password reset tokens for test suite.
#
# raw_token for `active_reset`  is: "resettoken_abcdef1234567890abcdef1234567890abcdef1234567890abcdef123456"
# raw_token for `expired_reset` is: "resettoken_expired_bcdef1234567890abcdef1234567890abcdef1234567890ab"
# raw_token for `used_reset`    is: "resettoken_used_cdef1234567890abcdef1234567890abcdef1234567890abcdef"

active_reset:
  admin_user: benjamin
  token_digest: <%= Digest::SHA256.hexdigest("resettoken_abcdef1234567890abcdef1234567890abcdef1234567890abcdef123456") %>
  expires_at: <%= 1.hour.from_now.iso8601 %>
  used_at: null

expired_reset:
  admin_user: benjamin
  token_digest: <%= Digest::SHA256.hexdigest("resettoken_expired_bcdef1234567890abcdef1234567890abcdef1234567890ab") %>
  expires_at: <%= 1.hour.ago.iso8601 %>
  used_at: null

used_reset:
  admin_user: benjamin
  token_digest: <%= Digest::SHA256.hexdigest("resettoken_used_cdef1234567890abcdef1234567890abcdef1234567890abcdef") %>
  expires_at: <%= 1.hour.from_now.iso8601 %>
  used_at: <%= 30.minutes.ago.iso8601 %>
