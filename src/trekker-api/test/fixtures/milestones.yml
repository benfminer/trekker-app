# Test fixtures for Milestone model and service tests.
#
# Three milestones at predictable markers relative to fixture submission totals.
# Total converted_miles from submission fixtures = 10 + 2 + 5 + 2025 = 2042 miles.
# near_milestone    is already crossed by the fixture data (marker = 100)
# far_milestone     is NOT crossed by fixture data (marker = 5000)
# untriggered_close is NOT crossed by fixture data (marker = 3000)

near_milestone:
  name: "Mexico"
  milestone_type: "country"
  mile_marker: 100.0
  description: "You've crossed into Mexico!"
  triggered: false
  triggered_at: null
  display_order: 1

far_milestone:
  name: "Pacific Ocean"
  milestone_type: "ocean"
  mile_marker: 5000.0
  description: "The Suns are crossing the Pacific!"
  triggered: false
  triggered_at: null
  display_order: 2

already_triggered:
  name: "San Diego Start"
  milestone_type: "city"
  mile_marker: 0.0
  description: "The journey begins!"
  triggered: true
  triggered_at: "2026-01-01 08:00:00"
  display_order: 0
